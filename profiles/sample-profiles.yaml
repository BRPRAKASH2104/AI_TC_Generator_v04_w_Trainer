# =================================================================
# ENVIRONMENTS
# =================================================================

environments:
  local-development:
    description: "Local development environment"
    ollama:
      host: "127.0.0.1"
      port: 11434
      timeout: 300

  docker-container:
    description: "Docker containerized environment"
    ollama:
      host: "ollama-service"
      port: 11434
      timeout: 600

  ci-pipeline:
    description: "CI/CD pipeline environment"
    ollama:
      host: "http://localhost:11434"  # CONFIGURE: Set to your CI Ollama server URL per environment
      port: 11434
      timeout: 180
      concurrent_requests: 8

  staging-environment:
    description: "Staging environment for pre-production testing"
    ollama:
      host: "http://localhost:11434"  # CONFIGURE: Set to your staging Ollama server URL per environment
      port: 11434
      timeout: 600
    static_test:
      assignee: "qa-team"
      labels: "staging, pre-production"

  production-environment:
    description: "Production environment"
    ollama:
      host: "http://localhost:11434"  # CONFIGURE: Set to your production Ollama server URL per environment
      port: 11434
      timeout: 900
      concurrent_requests: 2
    static_test:
      assignee: "production-team"
      labels: "production, validated, approved"

# =================================================================
# MODEL CONFIGURATIONS
# =================================================================

model_configurations:
  "llama3.1:8b":
    description: "Fast general-purpose model for quick iterations"
    keep_alive: "15m"
    num_ctx: 4096
    num_predict: 2048
    temperature: 0.0

  "deepseek-coder-v2:16b":
    description: "Advanced coding model for complex requirements"
    keep_alive: "45m"
    num_ctx: 8192
    num_predict: 3072
    temperature: 0.1

  "qwen2.5-coder:14b":
    description: "Alternative coding model with balanced performance"
    keep_alive: "30m"
    num_ctx: 6144
    num_predict: 2560
    temperature: 0.05

# =================================================================
# METADATA
# =================================================================

meta:
  version: "1.0"
  created: "2025-09-16"
  description: "AI Test Case Generator profile configuration"
  format: "Project.Model.Template.Mode"
  contact: "engineering@company.com"

# =================================================================
# USAGE EXAMPLES
# =================================================================
#
# Basic usage:
#   ai-tc-generator input/file.reqifz --profile IC.Llama31.Default
#   ai-tc-generator input/file.reqifz --profile AUTO.Deepseek.ECU.HP
#   ai-tc-generator input/file.reqifz --profile DEV.Llama31.Quick.HP
#
# With environment:
#   ai-tc-generator input/file.reqifz --profile PROD.Deepseek.Comprehensive.HP --env production-environment
#
# Override specific parameters:
#   ai-tc-generator input/file.reqifz --profile IC.Deepseek.Telltale.HP --max-concurrent 8
#   ai-tc-generator input/file.reqifz --profile AUTO.Llama31.ECU --verbose
#
# List available profiles:
#   ai-tc-generator --list-profiles
#
# Show specific profile details:
#   ai-tc-generator --show-profile IC.Deepseek.Telltale.HP
#
# =================================================================