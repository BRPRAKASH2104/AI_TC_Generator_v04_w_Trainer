# AI Test Case Generator - Example Configuration
# Updated for XLSX output format
# Minimum Python version: 3.13.5
# Last updated: 2024-12-19

# ============================================================================
# FILE PROCESSING CONFIGURATION
# ============================================================================
file_processing:
  # Input file settings
  INPUT_ENCODING: utf-8
  REQIFZ_PATTERN: '*.reqifz'
  VALIDATE_XML: true
  SKIP_EMPTY_TABLES: true
  MAX_TABLE_ROWS: 100
  
  # Output file settings
  OUTPUT_ENCODING: utf-8
  OUTPUT_SUFFIX: _TCD_{model}_{timestamp}.xlsx
  
  # Excel-specific settings
  EXCEL_ENGINE: openpyxl
  EXCEL_INDEX: false
  
  # Backup and storage
  BACKUP_DIRECTORY: backups

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
logging:
  # Basic logging settings
  LOG_LEVEL: INFO
  LOG_TO_FILE: false
  LOG_DIRECTORY: logs
  
  # Performance and monitoring
  MONITOR_PERFORMANCE: true
  LOG_API_CALLS: false
  LOG_TEMPLATE_USAGE: true

# ============================================================================
# OLLAMA API CONFIGURATION
# ============================================================================
ollama:
  # Connection settings
  host: 127.0.0.1
  port: 11434
  timeout: 600
  
  # Model settings
  temperature: 0.0
  max_retries: 3
  concurrent_requests: 4
  
  # Default models
  synthesizer_model: llama3.1:8b
  decomposer_model: deepseek-coder-v2:16b

# ============================================================================
# STATIC TEST CASE CONFIGURATION
# ============================================================================
static_test:
  # Test execution settings
  TEST_TYPE: PROVEtech
  PLANNED_EXECUTION: Manual
  
  # JIRA/Project management fields
  ISSUE_TYPE: Test
  PROJECT_KEY: TCTOIC
  ASSIGNEE: ENGG
  TEST_CASE_TYPE: Feature Functional
  COMPONENTS: SW_DI_FV
  LABELS: AI Generated TCs
  
  # Test preconditions
  VOLTAGE_PRECONDITION: |
    1. Voltage= 12V
    2. Bat-ON

# ============================================================================
# ADVANCED CONFIGURATION OPTIONS
# ============================================================================

# Excel output customization
excel_formatting:
  # Column widths (optional - for future enhancement)
  column_widths:
    "Issue ID": 10
    "Summary": 50
    "Description": 60
    "Action": 40
    "Data": 50
    "Expected Result": 50
  
  # Header formatting (optional - for future enhancement)
  header_style:
    bold: true
    background_color: "E6E6FA"
    text_color: "000000"

# Environment-specific settings
environment:
  # Development settings
  development:
    LOG_LEVEL: DEBUG
    LOG_TO_FILE: true
    MONITOR_PERFORMANCE: true
    timeout: 300
  
  # Production settings  
  production:
    LOG_LEVEL: INFO
    LOG_TO_FILE: true
    MONITOR_PERFORMANCE: false
    timeout: 600
    max_retries: 5
  
  # Testing settings
  testing:
    LOG_LEVEL: DEBUG
    LOG_TO_FILE: false
    timeout: 120
    MAX_TABLE_ROWS: 10

# ============================================================================
# MODEL-SPECIFIC CONFIGURATIONS
# ============================================================================
model_preferences:
  # Llama 3.1 8B settings
  "llama3.1:8b":
    temperature: 0.0
    timeout: 300
    max_context_length: 4000
    recommended_for:
      - general_requirements
      - simple_tables
      - basic_automotive_features
  
  # DeepSeek Coder V2 16B settings  
  "deepseek-coder-v2:16b":
    temperature: 0.0
    timeout: 600
    max_context_length: 8000
    recommended_for:
      - complex_requirements
      - large_tables
      - specialized_automotive_systems
      - door_control_systems
      - window_control_systems

# ============================================================================
# PROMPT TEMPLATE CONFIGURATION
# ============================================================================
prompt_system:
  # Template selection
  auto_selection: true
  fallback_template: "driver_information_default"
  
  # Template validation
  validate_on_load: true
  strict_validation: false
  
  # Performance
  cache_templates: true
  hot_reload: false

# ============================================================================
# OUTPUT QUALITY SETTINGS
# ============================================================================
quality_control:
  # Test case validation
  min_test_cases_per_requirement: 1
  max_test_cases_per_requirement: 50
  validate_output_structure: true
  
  # Content validation
  check_required_fields: true
  validate_test_case_format: true
  ensure_unique_issue_ids: true

# ============================================================================
# INTEGRATION SETTINGS
# ============================================================================
integration:
  # Test management tools
  jira:
    enabled: false
    server_url: ""
    project_key: "TCTOIC"
    default_assignee: "ENGG"
  
  # Version control
  git:
    auto_commit_outputs: false
    commit_message_template: "Generated test cases for {filename}"
  
  # CI/CD integration
  pipeline:
    generate_reports: true
    export_metrics: true
    notify_on_completion: false

# ============================================================================
# SECURITY AND COMPLIANCE
# ============================================================================
security:
  # Data protection
  sanitize_output: true
  remove_sensitive_data: true
  
  # Audit trail
  log_user_actions: false
  track_file_access: false
  
  # Compliance
  automotive_standards:
    iso_26262: true
    aspice: true
    functional_safety: true

# ============================================================================
# PERFORMANCE TUNING
# ============================================================================
performance:
  # Memory management
  max_memory_usage: "2GB"
  garbage_collection: "auto"
  
  # Processing optimization
  parallel_processing: false
  batch_size: 10
  chunk_large_files: true
  
  # Caching
  cache_parsed_reqif: true
  cache_ai_responses: false
  cache_duration: 3600

# ============================================================================
# DEBUGGING AND DEVELOPMENT
# ============================================================================
debug:
  # Development mode
  development_mode: false
  verbose_output: false
  
  # Debugging features
  save_intermediate_files: false
  log_ai_prompts: false
  log_ai_responses: false
  
  # Testing
  mock_ai_responses: false
  use_sample_data: false
  validate_input_files: true

# ============================================================================
# LOCALIZATION AND INTERNATIONALIZATION
# ============================================================================
localization:
  # Language settings
  default_language: "en"
  supported_languages: ["en", "de", "ja"]
  
  # Regional settings
  date_format: "YYYY-MM-DD"
  time_format: "24h"
  number_format: "decimal"
  
  # Text output
  use_unicode: true
  encoding: "utf-8"

# ============================================================================
# NOTIFICATION SETTINGS
# ============================================================================
notifications:
  # Email notifications (optional)
  email:
    enabled: false
    smtp_server: ""
    recipients: []
  
  # Slack notifications (optional)
  slack:
    enabled: false
    webhook_url: ""
    channel: "#test-automation"
  
  # Console notifications
  console:
    enabled: true
    show_progress: true
    show_summary: true

# ============================================================================
# BACKUP AND RECOVERY
# ============================================================================
backup:
  # Automatic backup
  auto_backup: false
  backup_interval: "daily"
  backup_location: "backups/"
  
  # Retention policy
  keep_backups: 30
  compress_backups: true
  
  # Recovery
  auto_recovery: false
  recovery_location: "recovery/"

# ============================================================================
# CUSTOM EXTENSIONS
# ============================================================================
extensions:
  # Custom processors
  custom_parsers: []
  custom_generators: []
  custom_validators: []
  
  # Plugin system
  plugins_directory: "plugins/"
  load_plugins: false
  
  # External tools
  external_tools: []

# ============================================================================
# VERSION INFORMATION
# ============================================================================
version:
  config_version: "1.2"
  app_version: "1.2.0"
  last_updated: "2024-12-19"
  updated_by: "AI Test Case Generator"
  
  # Compatibility
  min_python_version: "3.13.5"
  required_dependencies:
    - "pandas>=2.2.0"
    - "requests>=2.31.0"  
    - "PyYAML>=6.0.1"
    - "openpyxl>=3.1.0"
    - "click>=8.1.7"
    - "rich>=13.7.0"

# ============================================================================
# NOTES AND COMMENTS
# ============================================================================
# This configuration file provides comprehensive settings for the AI Test Case Generator
# 
# Key Changes for XLSX Support:
# - OUTPUT_SUFFIX changed to .xlsx extension
# - Added EXCEL_ENGINE and EXCEL_INDEX settings
# - Enhanced with Excel-specific formatting options
# 
# Usage:
# python src/generate_contextual_tests_v002.py --config this_file.yaml
# 
