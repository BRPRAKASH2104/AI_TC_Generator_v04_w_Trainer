# =================================================================
# CLI Configuration for AI Test Case Generator
# File: config/cli_config.yaml
# =================================================================

# Default CLI settings - these override built-in defaults
cli_defaults:
  # Processing settings
  mode: "standard"              # standard|hp|training
  model: "llama3.1:8b"         # Default AI model
  template: null               # Use auto-selection
  max_concurrent: 4            # For HP mode
  
  # Input/Output settings
  input_directory: "input/"    # Default input directory
  output_directory: null       # null = same as input directory
  
  # Logging and output control
  verbose: false               # Verbose output
  debug: false                 # Debug mode
  performance: false           # Performance metrics (HP mode)

# =================================================================
# Named Presets - Common Configuration Combinations
# =================================================================

presets:
  # Development preset - verbose output, debugging enabled
  development:
    mode: "standard"
    model: "llama3.1:8b"
    verbose: true
    debug: true
    max_concurrent: 2           # Lower concurrency for debugging
    
  # Production preset - high performance, minimal logging
  production:
    mode: "hp"
    model: "deepseek-coder-v2:16b"
    max_concurrent: 8
    performance: true           # Show metrics for monitoring
    verbose: false
    debug: false
    
  # Testing preset - balanced settings for CI/CD
  testing:
    mode: "standard"
    model: "llama3.1:8b"
    verbose: true
    debug: false
    max_concurrent: 2
    
  # High-speed preset - maximum performance
  turbo:
    mode: "hp"
    model: "llama3.1:8b"       # Faster model for speed
    max_concurrent: 12
    performance: true
    verbose: false

  # Accuracy preset - focus on quality over speed  
  accurate:
    mode: "standard"
    model: "deepseek-coder-v2:16b"  # Better model for accuracy
    verbose: true
    debug: true
    template: "driver_information_default"

  # NOTE: This model is not in the default supported set (llama3.1:8b, llama3.2-vision:11b). Ensure it is available in your Ollama instance.
  # Qwen 3 Vision preset
  qwen_vision:
    mode: "standard"
    model: "qwen3-vl:32b"       # Synthesizer model
    verbose: true
    ollama:
      vision_model: "qwen3-vl:32b"  # Vision model
      enable_vision: true

  # NOTE: This model is not in the default supported set (llama3.1:8b, llama3.2-vision:11b). Ensure it is available in your Ollama instance.
  # Qwen MoE preset (Fast/Efficient)
  qwen_moe:
    mode: "standard"
    model: "qwen3-vl:30b"       # MoE Synthesizer
    verbose: true
    ollama:
      vision_model: "qwen3-vl:30b"  # MoE Vision
      enable_vision: true

# =================================================================
# Environment-Specific Overrides
# =================================================================

environments:
  # Local development environment
  local:
    verbose: true
    debug: true
    max_concurrent: 2
    performance: false
    
  # Continuous Integration environment
  ci_cd:
    mode: "standard"           # Consistent, reliable processing
    verbose: false             # Minimal output for logs
    debug: false
    max_concurrent: 4
    performance: false
    
  # Staging environment
  staging:
    mode: "hp"
    model: "llama3.1:8b"
    max_concurrent: 6
    verbose: true              # More logging for staging validation
    performance: true
    
  # Production environment
  production:
    mode: "hp"
    model: "deepseek-coder-v2:16b"
    max_concurrent: 8
    verbose: false             # Minimal production logging
    debug: false
    performance: false         # No performance overhead in prod

# =================================================================
# Model-Specific Default Settings
# =================================================================

model_configs:
  "llama3.1:8b":
    timeout: 300               # 5 minutes
    temperature: 0.0
    recommended_concurrent: 6
    
  "deepseek-coder-v2:16b":
    timeout: 600               # 10 minutes (larger model)
    temperature: 0.0
    recommended_concurrent: 3   # More resource intensive

  "qwen3-vl:32b":
    timeout: 1500              # 25 minutes (large VL model needing more time)
    temperature: 0.0           # Slight temperature for creativity if needed, but usually 0 is best for tests
    recommended_concurrent: 1   # Heavier model

  "llama3.2-vision:11b":
    timeout: 600               # 10 minutes
    temperature: 0.0
    recommended_concurrent: 4   # Medium sized vision model

  "qwen3-vl:30b":
    timeout: 600               # 5 minutes (Fast MoE model)
    temperature: 0.1
    recommended_concurrent: 1   # Efficient MoE architecture

# =================================================================
# Team/Project Specific Settings
# =================================================================

project_settings:
  # Project name for logging and identification
  project_name: "AI_TC_Generator_v04"
  
  # Default file patterns
  input_patterns: 
    - "*.reqifz"
    - "*.xml"
  
  # Output naming conventions
  output_naming:
    excel_suffix: "_TCD"
    json_log_suffix: "_processing_log"
    timestamp_format: "%Y%m%d_%H%M%S"

# =================================================================
# Validation and Safety Settings
# =================================================================

validation:
  # Template validation
  validate_templates_on_startup: true
  require_template_validation: false
  
  # Input file validation  
  validate_input_files: true
  require_ollama_connection: true
  
  # Output validation
  validate_output_format: true
  backup_existing_outputs: false

# =================================================================
# Training and Fine-Tuning Settings
# =================================================================

training:
  # RAFT (Retrieval Augmented Fine-Tuning) settings
  # Set to true to collect RAFT training examples during processing (opt-in)
  enable_raft: false                   # Enable RAFT data collection
  collect_training_data: false         # Collect examples during processing
  training_data_dir: "training_data"   # Directory for training data
  
  # Training thresholds
  min_examples_for_training: 50        # Minimum examples needed (vision: 50, text: 100)
  
  # RAFT-specific settings
  raft_collect_context: true           # Collect context for RAFT training
  raft_min_oracle_docs: 1             # Minimum oracle documents per example
  raft_min_distractor_docs: 1         # Minimum distractor documents per example
  raft_context_window: 5              # Max context items to include
  
  # Quality settings
  min_quality_score: 0.7              # Minimum quality score for examples
  auto_approve_threshold: 0.9         # Auto-approve examples above this score
